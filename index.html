    <style>
      @media print {
        @page {
          size: A4;
          margin: 10mm;
        }
        
        body {
          background-color: white;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Hide interactive elements */
        .no-print, button, header, footer {
          display: none !important;
        }

        /* Force show specific elements if needed */
        .print-only {
          display: block !important;
        }

        /* Ensure containers expand */
        .min-h-screen {
          min-height: auto !important;
          height: auto !important;
        }

        /* Clean up shadows for flat paper look */
        .shadow-md, .shadow-lg, .shadow-xl, .shadow-sm {
          box-shadow: none !important;
          border: 1px solid #e5e7eb;
        }
        
        /* Prevent breaking inside cards */
        .print-break-inside {
          break-inside: avoid;
        }
        
        /* Custom Header for PDF only */
        #pdf-header {
          display: flex !important;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
          border-bottom: 2px solid #ddd;
          padding-bottom: 10px;
        }
      }

      /* Hide PDF header on screen */
      #pdf-header {
        display: none;
      }
